<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 포트폴리오</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; /* 딥 네이비 배경 */
            color: #f8fafc;
        }
        
        /* 네이비+골드 테마 카드 스타일 */
        .glass-card { 
            background-color: #1e293b; 
            border-radius: 16px; 
            border: 1px solid #334155;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        /* 텍스트 색상 유틸리티 */
        .text-gold { color: #fbbf24; } /* 골드 */
        .text-profit { color: #10b981; } /* 초록 (수익) */
        .text-loss { color: #ef4444; } /* 빨강 (손실) */
        
        .border-gold { border-color: #fbbf24; }
        .border-profit { border-color: #10b981; }
        .border-loss { border-color: #ef4444; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-[1200px] mx-auto space-y-6">
        
        <!-- 헤더 영역 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-700 pb-5 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-gold tracking-tight flex items-center gap-3">
                    <i data-lucide="briefcase" class="w-8 h-8"></i>
                    내 주식 포트폴리오
                </h1>
                <p class="text-sm text-slate-400 mt-2 ml-1 flex items-center gap-1.5">
                    <i data-lucide="info" class="w-4 h-4"></i> 구글 시트 실시간 연동 대시보드
                </p>
            </div>
            <div id="loading" class="text-sm font-semibold text-gold bg-yellow-900/30 px-4 py-2 rounded-full border border-yellow-700/50 flex items-center gap-2">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 데이터 불러오는 중...
            </div>
        </header>

        <!-- 1. 요약 카드 섹션 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 총 투자 금액 -->
            <div class="glass-card p-6 border-t-4 border-slate-500">
                <h3 class="text-sm font-medium text-slate-400 mb-2 flex items-center gap-2">
                    <i data-lucide="wallet" class="w-4 h-4"></i> 총 투자 금액
                </h3>
                <div class="text-3xl font-bold font-mono text-white" id="totalInvestment">₩ 0</div>
            </div>
            
            <!-- 현재 평가 금액 -->
            <div class="glass-card p-6 border-t-4 border-gold">
                <h3 class="text-sm font-medium text-slate-400 mb-2 flex items-center gap-2">
                    <i data-lucide="coins" class="w-4 h-4"></i> 현재 평가 금액
                </h3>
                <div class="text-3xl font-bold font-mono text-gold" id="currentValue">₩ 0</div>
            </div>
            
            <!-- 총 수익률 -->
            <div class="glass-card p-6 border-t-4" id="returnCard">
                <h3 class="text-sm font-medium text-slate-400 mb-2 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> 총 수익률
                </h3>
                <div class="text-3xl font-bold font-mono" id="totalReturn">0.00%</div>
            </div>
        </div>

        <!-- 2. 차트 섹션 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 비중 파이 차트 -->
            <div class="glass-card p-6 flex flex-col items-center">
                <h3 class="text-base font-bold text-slate-200 w-full mb-6 flex items-center gap-2 border-b border-slate-700 pb-3">
                    <i data-lucide="pie-chart" class="w-5 h-5 text-gold"></i> 종목별 보유 비중
                </h3>
                <div class="relative h-[280px] w-full flex justify-center">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <!-- 수익률 바 차트 -->
            <div class="glass-card p-6 flex flex-col">
                <h3 class="text-base font-bold text-slate-200 w-full mb-6 flex items-center gap-2 border-b border-slate-700 pb-3">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-gold"></i> 종목별 수익률 (%)
                </h3>
                <div class="relative h-[280px] w-full">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 3. 자산 상세 내역 테이블 -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-gold"></i> 자산 상세 내역
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-right">
                    <thead class="text-xs text-slate-400 bg-slate-900/50 uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">종목명</th>
                            <th class="px-6 py-4 font-semibold">매수가</th>
                            <th class="px-6 py-4 font-semibold text-white">현재가</th>
                            <th class="px-6 py-4 font-semibold">보유수량</th>
                            <th class="px-6 py-4 font-semibold text-gold">평가금액</th>
                            <th class="px-6 py-4 font-semibold">수익률</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50">
                        <!-- JS 렌더링 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // 사용자 제공 구글 시트 CSV URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUWLGZioezWEh7_m3hgWPm26KiiNxXSCxJDgFtcwj2ilfNhoMEuEwmXX0GW1IbSBCUJpgy9cjL6uIo/pub?gid=652234885&single=true&output=csv'; 

        // 유틸리티 함수
        const formatMoney = (num) => '₩ ' + Math.round(num).toLocaleString('ko-KR');
        const formatPercent = (num) => (num > 0 ? '+' : '') + num.toFixed(2) + '%';
        const getColorClass = (num) => num > 0 ? 'text-profit' : (num < 0 ? 'text-loss' : 'text-slate-400');

        let pieChartInstance = null;
        let barChartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            // CSV 로드
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processPortfolio(results.data);
                    
                    const loadingEl = document.getElementById('loading');
                    loadingEl.className = "text-sm font-semibold text-profit bg-green-900/30 px-4 py-2 rounded-full border border-green-700/50 flex items-center gap-2";
                    loadingEl.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> 업데이트 완료`;
                    lucide.createIcons();
                },
                error: function(err) {
                    console.error("CSV 로드 실패:", err);
                    const loadingEl = document.getElementById('loading');
                    loadingEl.className = "text-sm font-semibold text-loss bg-red-900/30 px-4 py-2 rounded-full border border-red-700/50 flex items-center gap-2";
                    loadingEl.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4"></i> 데이터 로드 실패`;
                    lucide.createIcons();
                }
            });
        });

        function processPortfolio(data) {
            let totalInvestment = 0;
            let totalCurrentValue = 0;
            const parsedData = [];

            data.forEach(row => {
                let name, buyPriceRaw, qtyRaw, currentPriceRaw;
                
                // 1. 헤더(열 이름)에 띄어쓰기나 오타가 있어도 유연하게 찾기
                for (let key of Object.keys(row)) {
                    const cleanKey = key.replace(/\s+/g, '');
                    if (cleanKey.includes('종목')) name = row[key];
                    if (cleanKey.includes('매수') || cleanKey.includes('단가')) buyPriceRaw = row[key];
                    if (cleanKey.includes('수량')) qtyRaw = row[key];
                    if (cleanKey.includes('현재가') || cleanKey.includes('종가')) currentPriceRaw = row[key];
                }

                if(!name || !buyPriceRaw || !qtyRaw || !currentPriceRaw) return;

                // 2. 콤마(,)나 ₩ 기호 등을 깔끔하게 제거하고 숫자로 변환
                const parseNum = (val) => parseFloat(String(val).replace(/,/g, '').replace(/[^\d.-]/g, ''));

                const buyPrice = parseNum(buyPriceRaw);
                const qty = parseNum(qtyRaw);
                const currentPrice = parseNum(currentPriceRaw);

                if(isNaN(buyPrice) || isNaN(qty) || isNaN(currentPrice)) return;

                const investAmount = buyPrice * qty;
                const currentAmount = currentPrice * qty;
                const returnRate = ((currentPrice - buyPrice) / buyPrice) * 100;

                totalInvestment += investAmount;
                totalCurrentValue += currentAmount;

                parsedData.push({
                    name, buyPrice, currentPrice, qty, investAmount, currentAmount, returnRate
                });
            });

            const totalReturnRate = totalInvestment > 0 ? ((totalCurrentValue - totalInvestment) / totalInvestment) * 100 : 0;

            // 1. 요약 카드 업데이트
            document.getElementById('totalInvestment').innerText = formatMoney(totalInvestment);
            document.getElementById('currentValue').innerText = formatMoney(totalCurrentValue);
            
            const retEl = document.getElementById('totalReturn');
            retEl.innerText = formatPercent(totalReturnRate);
            retEl.className = `text-3xl font-bold font-mono ${getColorClass(totalReturnRate)}`;
            
            const returnCard = document.getElementById('returnCard');
            returnCard.classList.add(totalReturnRate >= 0 ? 'border-profit' : 'border-loss');

            // 2. 테이블 업데이트 (평가금액 높은 순 정렬)
            parsedData.sort((a, b) => b.currentAmount - a.currentAmount);
            renderTable(parsedData);

            // 3. 차트 업데이트
            drawCharts(parsedData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800 transition-colors";
                
                tr.innerHTML = `
                    <td class="px-6 py-4 text-left font-bold text-slate-200">${item.name}</td>
                    <td class="px-6 py-4 text-slate-400 font-mono">${item.buyPrice.toLocaleString()}</td>
                    <td class="px-6 py-4 text-white font-mono font-bold">${item.currentPrice.toLocaleString()}</td>
                    <td class="px-6 py-4 text-slate-400 font-mono">${item.qty.toLocaleString()}</td>
                    <td class="px-6 py-4 text-gold font-mono font-bold bg-slate-800/30">${item.currentAmount.toLocaleString()}</td>
                    <td class="px-6 py-4 font-mono font-bold ${getColorClass(item.returnRate)}">${formatPercent(item.returnRate)}</td>
                `;
                tbody.appendChild(tr);
            });
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-500">포트폴리오 데이터가 없거나 형식이 맞지 않습니다.</td></tr>`;
            }
        }

        function drawCharts(data) {
            Chart.defaults.color = '#94a3b8'; // Slate 400
            Chart.defaults.font.family = 'Pretendard';

            const labels = data.map(d => d.name);
            const values = data.map(d => d.currentAmount);
            const returns = data.map(d => d.returnRate);

            // 1. 파이 차트 (금융/네이비/골드 계열 색상)
            const pieColors = ['#005bb6', '#fbbf24', '#ef4444', '#10b981', '#8b5cf6', '#38bdf8', '#cbd5e1'];
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            
            if(pieChartInstance) pieChartInstance.destroy();
            
            pieChartInstance = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: pieColors,
                        borderColor: '#1e293b',
                        borderWidth: 2,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'right', labels: { padding: 20, usePointStyle: true, color: '#e2e8f0' } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1) + '%';
                                    return ` ${context.label}: ${formatMoney(value)} (${percentage})`;
                                }
                            }
                        }
                    }
                }
            });

            // 2. 바 차트 (수익률 초록/빨강)
            const barColors = returns.map(r => r > 0 ? '#10b981' : '#ef4444');
            const barCtx = document.getElementById('barChart').getContext('2d');
            
            if(barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: returns,
                        backgroundColor: barColors,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) { return ` ${formatPercent(context.raw)}`; }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: '#334155' },
                            ticks: { callback: (value) => value + '%' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
